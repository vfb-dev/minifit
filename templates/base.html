<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}MiniFit{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'tracker:dashboard' %}">MiniFit</a>

            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'tracker:dashboard' %}">Dashboard</a>
                <a class="nav-link" href="{% url 'tracker:workout_list' %}">Workouts</a>
                <a class="nav-link" href="{% url 'tracker:exercise_list' %}">Exercises</a>
                <a class="nav-link" href="{% url 'tracker:body_metric_list' %}">Metrics</a>
                <a class="nav-link" href="{% url 'tracker:goal_list' %}">Goals</a>
            </div>

            <div class="ms-auto d-flex align-items-center gap-2">
                {% if user.is_authenticated %}
                    <span class="navbar-text text-white-50">{{ user.username }}</span>

                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
                    </form>
                {% else %}
                    <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Login</a>
                    <a class="btn btn-primary btn-sm" href="{% url 'tracker:register' %}">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
