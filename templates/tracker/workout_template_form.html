{% extends "base.html" %}

{% block title %}Template | MiniFit{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h1 class="h3 mb-4">Add Template</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary" type="submit">Save Template</button>
        </form>
    </div>
</div>
{% endblock %}
