{% extends "base.html" %}

{% block title %}Add Workout | MiniFit{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{% url 'tracker:workout_list' %}" class="btn btn-outline-secondary btn-sm">Back to workouts</a>
</div>

<div class="card">
    <div class="card-body">
        <h1 class="h3 mb-4">Add Workout</h1>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label" for="{{ form.title.id_for_label }}">Title</label>
                {{ form.title }}
                {{ form.title.errors }}
            </div>

            <div class="mb-3">
                <label class="form-label" for="{{ form.date.id_for_label }}">Date</label>
                {{ form.date }}
                {{ form.date.errors }}
            </div>

            <div class="mb-3">
                <label class="form-label" for="{{ form.notes.id_for_label }}">Notes</label>
                {{ form.notes }}
                {{ form.notes.errors }}
            </div>

            <button class="btn btn-primary" type="submit">Save Workout</button>
        </form>
    </div>
</div>
{% endblock %}
