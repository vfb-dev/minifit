{% extends "base.html" %}

{% block title %}Delete Body Metric | MiniFit{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h1 class="h3 mb-3">Delete Body Metric</h1>

        <p>
            Are you sure you want to delete the metric from
            <strong>{{ metric.date }}</strong>?
        </p>

        <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger" type="submit">Yes, Delete</button>
            <a href="{% url 'tracker:body_metric_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
