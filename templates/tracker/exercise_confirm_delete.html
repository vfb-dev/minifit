{% extends "base.html" %}

{% block title %}Delete Exercise | DJ Fit{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h1 class="h3 mb-3">Delete Exercise</h1>

        <p>
            Are you sure you want to delete
            <strong>{{ exercise.name }}</strong>?
        </p>

        <p class="text-danger">
            This will also delete workout sets that use this exercise.
        </p>

        <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger" type="submit">Yes, Delete</button>
            <a href="{% url 'tracker:exercise_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
