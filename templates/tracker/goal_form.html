{% extends "base.html" %}

{% block title %}Goal | MiniFit{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h1 class="h3 mb-4">{% if is_editing %}Edit Goal{% else %}Add Goal{% endif %}</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="btn btn-primary" type="submit">
                {% if is_editing %}Update Goal{% else %}Save Goal{% endif %}
            </button>

            <a href="{% url 'tracker:goal_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
