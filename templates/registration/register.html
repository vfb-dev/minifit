{% extends "base.html" %}

{% block title %}Register | DJ Fit{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 col-xl-4">
            <div class="card auth-card">
                <div class="card-body">
                    <span class="auth-mark"><i data-lucide="activity"></i></span>
                    <div class="eyebrow">Start tracking</div>
                    <h1 class="h3 mb-2">Create Account</h1>
                    <p class="text-muted mb-4">Set up DJ Fit and keep your workouts, metrics, and goals together.</p>

                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}

                        <button class="btn btn-primary w-100" type="submit">
                            <i data-lucide="user-plus"></i><span>Register</span>
                        </button>
                    </form>

                    <p class="mt-3 mb-0">
                        Already have an account?
                        <a href="{% url 'login' %}">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
