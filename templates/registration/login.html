{% extends "base.html" %}

{% block title %}Login | MiniFit{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 col-xl-4">
            <div class="card auth-card">
                <div class="card-body">
                    <span class="auth-mark"><i data-lucide="activity"></i></span>
                    <div class="eyebrow">Welcome back</div>
                    <h1 class="h3 mb-2">Login</h1>
                    <p class="text-muted mb-4">Open your training dashboard and keep logging.</p>

                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}

                        <button class="btn btn-primary w-100" type="submit">
                            <i data-lucide="log-in"></i><span>Login</span>
                        </button>
                    </form>

                    <p class="mt-3 mb-0">
                        No account yet?
                        <a href="{% url 'tracker:register' %}">Create one</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
