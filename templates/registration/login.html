{% extends "base.html" %}

{% block title %}Login | MiniFit{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body">
                <h1 class="h3 mb-4">Login</h1>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button class="btn btn-primary w-100" type="submit">Login</button>
                </form>

                <p class="mt-3 mb-0">
                    No account yet?
                    <a href="{% url 'tracker:register' %}">Create one</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
