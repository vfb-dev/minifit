{% extends "base.html" %}

{% block title %}Change Password | DJ Fit{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{% url 'tracker:profile' %}" class="btn btn-outline-secondary btn-sm">Back to profile</a>
</div>

<div class="card">
    <div class="card-body">
        <h1 class="h3 mb-4">Change Password</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="btn btn-primary" type="submit">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
